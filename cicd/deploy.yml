name: CI/CD - Build & Deploy to Azure

# ─────────────────────────────────────────────────────────────────
# Ce workflow se déclenche à chaque push ou PR sur main.
# Il lance les tests puis déploie sur Azure Web App.
#
# SECRETS À CONFIGURER DANS GITHUB (Settings > Secrets > Actions) :
#
#   AZURE_CREDENTIALS  →  JSON du service principal, format :
#     {
#       "clientId": "3dbccadf-c86c-4e1f-8951-532628dea8cd",
#       "clientSecret": "<VOTRE_NOUVEAU_SECRET>",
#       "subscriptionId": "7692ba94-fc6c-478c-b875-f843900ba2ed",
#       "tenantId": "64dd45e7-1fde-4ce7-b28d-dbf6f864f315"
#     }
# ─────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1 : Tests ──────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pandas numpy scikit-learn streamlit joblib mlflow pytest

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  # ── Job 2 : Deploy to Azure Web App ────────────────────────────
  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Create deployment package
        run: |
          zip -r deploy.zip app/ models/ requirements.txt startup.sh Procfile

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: webapp-mlops
          package: deploy.zip

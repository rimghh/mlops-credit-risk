name: CI/CD - Build & Deploy to Azure

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1 : Tests ──────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "mlops webapp"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest mlflow

      - name: Train model
        run: python src/train.py

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  # ── Job 2 : Deploy to Azure Web App ────────────────────────────
  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Create deployment package
        run: |
          cd "mlops webapp"
          zip -r ../deploy.zip app/ models/ requirements.txt startup.sh Procfile

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.DEV }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: webapp-mlops
          package: deploy.zip
